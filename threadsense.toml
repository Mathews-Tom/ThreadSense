[app]
inference_backend = "local_openai_compatible"
privacy_mode = "local_only"

[runtime]
base_url = "http://127.0.0.1:8080"
chat_path = "/v1/chat/completions"
model = "local-model"
timeout_seconds = 30

[sources]
enabled = "reddit"

[reddit]
user_agent = "threadsense/0.1.0 (https://github.com/Mathews-Tom/ThreadSense)"
timeout_seconds = 15
max_retries = 2
backoff_seconds = 0.5
request_delay_seconds = 0.6
listing_limit = 500

[storage]
root_dir = ".threadsense"
raw_dirname = "raw"
normalized_dirname = "normalized"
