[app]
inference_backend = "local_openai_compatible"
privacy_mode = "local_only"

[runtime]
enabled = true
base_url = "http://127.0.0.1:11434"
chat_path = "/v1/chat/completions"
model = "gemma4:latest"
timeout_seconds = 120
repair_retries = 1
json_mode = false

[sources]
enabled = "reddit,hackernews"

[reddit]
user_agent = "threadsense/0.1.0a0 (https://github.com/Mathews-Tom/ThreadSense)"
timeout_seconds = 15
max_retries = 2
backoff_seconds = 0.5
request_delay_seconds = 0.6
listing_limit = 500

[hackernews]
base_url = "https://hacker-news.firebaseio.com/v0"
timeout_seconds = 15
request_delay_seconds = 1.0

[github]
base_url = "https://api.github.com/graphql"
token = ""
timeout_seconds = 20

[cache]
enabled = true
ttl_seconds = 3600
cache_dir = ".threadsense/cache"

[storage]
root_dir = ".threadsense"
raw_dirname = "raw"
normalized_dirname = "normalized"
analysis_dirname = "analysis"
report_dirname = "reports"
batch_dirname = "batches"
corpus_dirname = "corpora"
index_dirname = "index"
versioning_enabled = false

[batch]
max_workers = 2
max_jobs = 25
fail_fast = false

[api]
host = "127.0.0.1"
port = 8090
max_request_bytes = 1048576

[limits]
runtime_concurrency = 1

[analysis]
strategy = "keyword_heuristic"
domain = "developer_tools"
objective = "general_survey"
abstraction_level = "operational"
duplicate_threshold = 0.88

[corpus]
trend_period = "month"
evidence_limit = 3
