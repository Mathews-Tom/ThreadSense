[meta]
domain = "product_feedback"
version = "1.1"

[themes]
pricing = ["pricing", "price", "subscription", "plan", "cost", "value", "tier", "free", "paid"]
limits = ["limit", "quota", "rate limit", "cap", "usage", "credits", "throttle", "context window"]
reliability = ["bug", "broken", "crash", "error", "downtime", "incident", "timeout", "outage"]
experience = ["confusing", "ux", "ui", "workflow", "onboarding", "discoverability", "intuitive", "clunky"]
support = ["support", "ticket", "response", "refund", "help", "billing", "documentation", "docs"]

[markers]
issue = ["broken", "error", "bug", "downtime", "refund", "frustrating", "slow"]
request = ["please", "need", "want", "can you", "should", "wish"]

[severity]
levels = ["low", "medium", "high"]

[fallbacks]
issue = "reliability"
request = "support"
default = "general_feedback"
